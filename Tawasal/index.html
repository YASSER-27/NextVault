<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tawasl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #181818;
  --surface:   #1E1E1E;
  --surface-2: #242424;
  --surface-3: #2A2A2A;
  --border:    #2E2E2E;
  --border-2:  #383838;
  --accent:    #5B8AF0;
  --accent-dim:#3a5fa8;
  --accent-glow: rgba(91,138,240,0.15);
  --danger:    #E05B5B;
  --success:   #3DAA79;
  --warn:      #E0943D;
  --text-1:    #F0F0F0;
  --text-2:    #A0A0A0;
  --text-3:    #606060;
  --radius:    12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow:    0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.7);
  --font-body: 'Noto Kufi Arabic', sans-serif;
  --font-display: 'Syne', sans-serif;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── Scrollbar ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

/* ─── Auth Screen ─────────────────────────────────────────────────────────── */
#auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

#auth-screen::before {
  content: '';
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(91,138,240,0.08) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
  position: relative;
  z-index: 1;
}

.auth-logo {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text-1);
  text-align: center;
  margin-bottom: 6px;
}

.auth-logo span { color: var(--accent); }

.auth-tagline {
  text-align: center;
  color: var(--text-2);
  font-size: 13px;
  margin-bottom: 36px;
}

.auth-tabs {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 28px;
  gap: 3px;
}

.auth-tab {
  flex: 1;
  padding: 9px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  border-radius: 6px;
  cursor: pointer;
  border: none;
  color: var(--text-2);
  background: transparent;
  transition: var(--transition);
}

.auth-tab.active {
  background: var(--surface-3);
  color: var(--text-1);
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-1);
  outline: none;
  transition: var(--transition);
  direction: rtl;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-input::placeholder { color: var(--text-3); }

.code-display {
  background: var(--surface-3);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-align: center;
  margin-top: 6px;
}

.code-value {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 6px;
  color: var(--accent);
  display: block;
}

.code-hint {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 6px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  border: none;
  transition: var(--transition);
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  width: 100%;
}

.btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  background: var(--surface-2);
  color: var(--text-1);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid transparent;
  padding: 6px 12px;
  font-size: 12px;
}

.btn-danger:hover { background: rgba(224,91,91,0.1); border-color: rgba(224,91,91,0.3); }

.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-icon {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  color: var(--text-2);
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.btn-icon:hover { background: var(--surface-2); color: var(--text-1); }

.auth-error {
  background: rgba(224,91,91,0.1);
  border: 1px solid rgba(224,91,91,0.3);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

/* ─── App Layout ─────────────────────────────────────────────────────────── */
#app {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.topbar-logo {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -0.5px;
}

.topbar-logo span { color: var(--accent); }

.topbar-nav {
  display: flex;
  gap: 4px;
  flex: 1;
  justify-content: center;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-2);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  transition: var(--transition);
  position: relative;
}

.nav-btn:hover { background: var(--surface-2); color: var(--text-1); }
.nav-btn.active { background: var(--surface-3); color: var(--accent); }

.nav-badge {
  background: var(--danger);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

.topbar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: auto;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-display);
  color: #fff;
  flex-shrink: 0;
}

.avatar-lg {
  width: 42px;
  height: 42px;
  font-size: 14px;
}

.avatar-sm {
  width: 28px;
  height: 28px;
  font-size: 10px;
}

.topbar-username {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-1);
}

.topbar-code {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-display);
  letter-spacing: 1px;
}

/* ─── Main Content ───────────────────────────────────────────────────────── */
.app-content {
  flex: 1;
  overflow: hidden;
  display: flex;
}

.view { display: none; width: 100%; height: 100%; }
.view.active { display: flex; }

/* ─── Feed View ──────────────────────────────────────────────────────────── */
#view-feed {
  justify-content: center;
  overflow-y: auto;
  padding: 24px 16px;
}

.feed-container {
  width: 100%;
  max-width: 640px;
}

.compose-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 20px;
}

.compose-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.compose-textarea {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-1);
  resize: none;
  outline: none;
  min-height: 80px;
  max-height: 200px;
  overflow-y: auto;
  transition: var(--transition);
  direction: rtl;
}

.compose-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.compose-textarea::placeholder { color: var(--text-3); }

.compose-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 12px;
}

.char-count {
  font-size: 12px;
  color: var(--text-3);
  align-self: center;
  margin-left: 12px;
}

/* Post Card */
.post-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 12px;
  transition: var(--transition);
  animation: fadeIn 0.3s ease;
}

.post-card:hover { border-color: var(--border-2); }

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.post-meta { flex: 1; }
.post-author {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge-admin {
  background: rgba(224,184,61,0.15);
  color: #E0B83D;
  border: 1px solid rgba(224,184,61,0.3);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 1px 6px;
  border-radius: 4px;
  text-transform: uppercase;
}

.post-time {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}

.post-content {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-1);
  word-break: break-word;
  white-space: pre-wrap;
}

.post-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ─── Chat View ──────────────────────────────────────────────────────────── */
#view-chat {
  overflow: hidden;
}

.chat-layout {
  display: flex;
  width: 100%;
  height: 100%;
}

.chat-sidebar {
  width: 280px;
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.user-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.user-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}

.user-item:hover { background: var(--surface-2); }
.user-item.active { background: var(--surface-3); }

.online-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  position: absolute;
  bottom: 10px;
  right: 10px;
  border: 2px solid var(--surface);
}

.user-item-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-1);
  flex: 1;
}

.unread-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  flex-shrink: 0;
}

.chat-with-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
}

.chat-status {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
}

.chat-empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  gap: 12px;
}

.chat-empty-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--surface-2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg-wrapper {
  display: flex;
  gap: 8px;
  max-width: 75%;
  animation: fadeIn 0.2s ease;
}

.msg-wrapper.outgoing { align-self: flex-end; flex-direction: row-reverse; }
.msg-wrapper.incoming { align-self: flex-start; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  position: relative;
  max-width: 100%;
  white-space: pre-wrap;
}

.msg-wrapper.outgoing .msg-bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.msg-wrapper.incoming .msg-bubble {
  background: var(--surface-3);
  color: var(--text-1);
  border-bottom-left-radius: 4px;
}

.msg-time {
  font-size: 10px;
  color: var(--text-3);
  align-self: flex-end;
  margin-bottom: 4px;
  flex-shrink: 0;
}

.msg-delete-btn {
  opacity: 0;
  transition: opacity 0.15s;
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--danger);
  border: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  cursor: pointer;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}

.msg-wrapper:hover .msg-delete-btn { opacity: 1; }

.chat-input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface);
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-1);
  resize: none;
  outline: none;
  max-height: 120px;
  overflow-y: auto;
  transition: var(--transition);
  direction: rtl;
}

.chat-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.chat-input::placeholder { color: var(--text-3); }

.send-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  flex-shrink: 0;
  transition: var(--transition);
}

.send-btn:hover { background: var(--accent-dim); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── Users View ─────────────────────────────────────────────────────────── */
#view-users {
  overflow-y: auto;
  justify-content: center;
  padding: 24px 16px;
}

.users-grid {
  width: 100%;
  max-width: 880px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.user-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px 16px;
  text-align: center;
  transition: var(--transition);
  animation: fadeIn 0.3s ease;
}

.user-card:hover { border-color: var(--border-2); transform: translateY(-2px); }

.user-card-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  margin: 0 auto 12px;
}

.user-card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 4px;
}

.user-card-joined {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 12px;
}

.online-indicator {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--success);
  font-weight: 600;
}

.offline-indicator {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-3);
}

/* ─── Admin View ─────────────────────────────────────────────────────────── */
#view-admin {
  overflow-y: auto;
  justify-content: center;
  padding: 24px 16px;
}

.admin-container {
  width: 100%;
  max-width: 800px;
}

.section-heading {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.admin-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 28px;
}

.admin-table table {
  width: 100%;
  border-collapse: collapse;
}

.admin-table th {
  text-align: right;
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-3);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}

.admin-table td {
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-1);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: var(--surface-2); }

.code-chip {
  font-family: var(--font-display);
  font-size: 12px;
  letter-spacing: 2px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 3px 8px;
  border-radius: 4px;
}

/* ─── Notification Toast ──────────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  top: 70px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
}

.toast {
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--radius);
  padding: 12px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 260px;
  max-width: 340px;
  animation: slideIn 0.3s ease;
}

.toast-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.toast-content { flex: 1; }
.toast-title { font-size: 13px; font-weight: 700; color: var(--text-1); }
.toast-body { font-size: 12px; color: var(--text-2); margin-top: 2px; }

/* ─── Modal ──────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.15s ease;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-lg);
  padding: 32px;
  max-width: 400px;
  width: 90%;
  box-shadow: var(--shadow-lg);
}

.modal-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 10px;
}

.modal-body { font-size: 13px; color: var(--text-2); margin-bottom: 24px; line-height: 1.7; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ─── Divider ────────────────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 0;
}

/* ─── Date Separator ─────────────────────────────────────────────────────── */
.date-sep {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-3);
  font-size: 11px;
  margin: 8px 0;
}

.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── Loading ────────────────────────────────────────────────────────────── */
.loading-spinner {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-3);
}

.spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ─── Empty State ────────────────────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-3);
  text-align: center;
  gap: 12px;
}

.empty-state-icon {
  font-size: 40px;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* ─── Animations ─────────────────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ─── Icons (SVG inline helpers) ─────────────────────────────────────────── */
.icon { display: inline-block; flex-shrink: 0; }

/* ─── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .topbar-nav .nav-label { display: none; }
  .chat-sidebar { width: 60px; }
  .user-item-name, .unread-badge { display: none; }
  .chat-sidebar.open { width: 240px; }
  .auth-card { padding: 28px 20px; }
}
</style>
</head>
<body>

<!-- ─── Auth Screen ─────────────────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Tawa<span>sl</span></div>

      <button class="btn btn-primary" onclick="register()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        إنشاء حساب

    <!-- Login -->

        <label class="form-label">الكود الشخصي</label>

               style="text-align:center; font-size:20px; font-family:var(--font-display); letter-spacing:4px; text-transform:uppercase;" />
      </div>
      <button class="btn btn-primary" onclick="login()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        دخول
      </button>
    </div>
  </div>
</div>

<!-- ─── App ────────────────────────────────────────────────────────────── -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">Tawa<span>sl</span></div>
    <nav class="topbar-nav">
      <button class="nav-btn active" data-view="feed" onclick="switchView('feed', this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">الرئيسية</span>
      </button>
      <button class="nav-btn" data-view="chat" onclick="switchView('chat', this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="nav-label">الدردشة</span>
        <span id="nav-chat-badge" class="nav-badge" style="display:none;">0</span>
      </button>
      <button class="nav-btn" data-view="users" onclick="switchView('users', this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-label">المستخدمون</span>
      </button>
      <button id="admin-nav-btn" class="nav-btn" data-view="admin" onclick="switchView('admin', this)" style="display:none;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="nav-label">الإدارة</span>
      </button>
    </nav>
    <div class="topbar-user">
      <div>
        <div class="topbar-username" id="topbar-username"></div>
        <div class="topbar-code" id="topbar-code"></div>
      </div>
      <div class="avatar" id="topbar-avatar"></div>
      <button class="btn-icon" onclick="confirmLogout()" title="تسجيل الخروج">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="app-content">

    <!-- Feed View -->
    <div id="view-feed" class="view active">
      <div class="feed-container">
        <div class="compose-card">
          <div class="compose-row">
            <div class="avatar avatar-lg" id="compose-avatar"></div>
            <textarea class="compose-textarea" id="compose-text" placeholder="ماذا تريد أن تشارك..." rows="3"
                      oninput="updateCharCount(this)"></textarea>
          </div>
          <div class="compose-actions">
            <span class="char-count" id="char-count">0 / 1000</span>
            <button class="btn btn-primary btn-sm" onclick="submitPost()">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              نشر
            </button>
          </div>
        </div>
        <div id="posts-container">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="view">
      <div class="chat-layout">
        <!-- Sidebar -->
        <div class="chat-sidebar">
          <div class="sidebar-header">المحادثات</div>
          <div class="user-list" id="chat-user-list"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chat-area">
          <div class="chat-empty-state">
            <div class="chat-empty-icon">
              <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" color="#606060"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div style="font-size:14px; color:var(--text-3);">اختر شخصًا لبدء المحادثة</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Users View -->
    <div id="view-users" class="view">
      <div class="users-grid" id="users-grid">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Admin View -->
    <div id="view-admin" class="view">
      <div class="admin-container">
        <div class="section-heading">إدارة المستخدمين</div>
        <div class="admin-table" id="admin-users-table">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
        <div class="section-heading">آخر المنشورات</div>
        <div class="admin-table" id="admin-posts-table">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Confirm Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">تأكيد</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-danger btn-sm" id="modal-confirm-btn" onclick="modalConfirmAction()">تأكيد الحذف</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
let currentUser = null;
let currentChatUser = null;
let ws = null;
let onlineUsers = new Set();
let unreadCounts = {};
let modalCallback = null;
let allUsers = [];

// ─── Utility ──────────────────────────────────────────────────────────────
function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function formatTime(dt) {
  const d = new Date(dt);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'الآن';
  if (diff < 3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
  if (diff < 86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
  if (diff < 172800) return 'أمس';
  return d.toLocaleDateString('ar-MA', { day:'numeric', month:'short' });
}

function formatMsgTime(dt) {
  return new Date(dt).toLocaleTimeString('ar-MA', { hour:'2-digit', minute:'2-digit' });
}

function showToast(title, body, color) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `
    <div class="toast-dot" style="background:${color || 'var(--accent)'}"></div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      ${body ? `<div class="toast-body">${body}</div>` : ''}
    </div>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = '0.4s'; setTimeout(() => t.remove(), 400); }, 4000);
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function openModal(title, body, callback) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  document.getElementById('modal-overlay').style.display = 'flex';
  modalCallback = callback;
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').style.display = 'none';
    modalCallback = null;
  }
}

function modalConfirmAction() {
  if (modalCallback) modalCallback();
  closeModal();
}

// ─── Auth ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='register')));
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('auth-error').style.display = 'none';
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  if (!name) { showError('الرجاء إدخال الاسم'); return; }
  const res = await fetch('/api/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: name })
  });
  const data = await res.json();
  if (!res.ok) { showError(data.error); return; }
  currentUser = data.user;
  document.getElementById('reg-code-value').textContent = data.user.code;
  document.getElementById('reg-code-section').style.display = 'block';
  document.getElementById('reg-enter-btn').style.display = 'block';
  document.querySelector('#tab-register .btn-primary').style.display = 'none';
  document.getElementById('reg-name').disabled = true;
}

async function login() {
  const code = document.getElementById('login-code').value.trim().toUpperCase();
  if (code.length !== 6) { showError('الكود يجب أن يكون 6 أحرف'); return; }
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code })
  });
  const data = await res.json();
  if (!res.ok) { showError(data.error); return; }
  currentUser = data.user;
  enterApp();
}

function enterApp() {
  if (!currentUser) return;
  localStorage.setItem('tawasl_user', JSON.stringify(currentUser));
  startApp();
}

function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';

  // Set user info in topbar
  const av = document.getElementById('topbar-avatar');
  av.textContent = getInitials(currentUser.username);
  av.style.background = currentUser.avatar_color;
  document.getElementById('topbar-username').textContent = currentUser.username;
  document.getElementById('topbar-code').textContent = currentUser.code;

  const composeAv = document.getElementById('compose-avatar');
  composeAv.textContent = getInitials(currentUser.username);
  composeAv.style.background = currentUser.avatar_color;

  if (currentUser.is_admin) {
    document.getElementById('admin-nav-btn').style.display = 'flex';
  }

  initWebSocket();
  loadFeed();
  loadUnread();
}

function confirmLogout() {
  openModal('تسجيل الخروج', 'هل تريد تسجيل الخروج؟ ستحتاج لكودك للدخول مرة أخرى.', () => {
    localStorage.removeItem('tawasl_user');
    currentUser = null;
    if (ws) ws.close();
    location.reload();
  });
}

// ─── WebSocket ────────────────────────────────────────────────────────────
function initWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'auth', userId: currentUser.id }));
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    handleWSMessage(msg);
  };

  ws.onclose = () => {
    setTimeout(initWebSocket, 3000);
  };
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'online_users':
      onlineUsers = new Set(msg.users);
      refreshOnlineStatus();
      break;
    case 'new_post':
      prependPost(msg.post);
      break;
    case 'post_deleted':
      document.getElementById(`post-${msg.postId}`)?.remove();
      break;
    case 'new_user':
      allUsers.push(msg.user);
      refreshUserViews();
      break;
    case 'user_deleted':
      if (msg.userId === currentUser.id) {
        showToast('تم حذف حسابك', 'قام المسؤول بحذف حسابك', 'var(--danger)');
        setTimeout(() => { localStorage.removeItem('tawasl_user'); location.reload(); }, 3000);
      } else {
        allUsers = allUsers.filter(u => u.id !== msg.userId);
        refreshUserViews();
        if (currentChatUser?.id === msg.userId) renderChatEmpty();
      }
      break;
    case 'new_message':
      if (currentChatUser && msg.message.from_user_id === currentChatUser.id) {
        appendMessage(msg.message);
        // mark as read immediately
        fetch(`/api/messages/${currentUser.id}/${currentChatUser.id}`);
      } else {
        const uid = msg.message.from_user_id;
        unreadCounts[uid] = (unreadCounts[uid] || 0) + 1;
        const sender = allUsers.find(u => u.id === uid);
        showToast(sender?.username || 'رسالة جديدة', msg.message.content.slice(0, 60), 'var(--accent)');
        updateChatBadge();
        updateUserUnreadBadge(uid);
      }
      break;
    case 'message_deleted':
      document.getElementById(`msg-${msg.messageId}`)?.remove();
      break;
  }
}

// ─── Navigation ───────────────────────────────────────────────────────────
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  btn.classList.add('active');

  if (name === 'users') loadUsers();
  if (name === 'admin') loadAdmin();
}

// ─── Feed ─────────────────────────────────────────────────────────────────
async function loadFeed() {
  const res = await fetch('/api/posts');
  const posts = await res.json();
  const container = document.getElementById('posts-container');
  container.innerHTML = '';
  if (posts.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="color:var(--text-3); font-size:13px;">لا توجد منشورات بعد. كن أول من ينشر.</div></div>';
  } else {
    posts.forEach(p => container.appendChild(buildPostEl(p)));
  }
}

function buildPostEl(post) {
  const el = document.createElement('div');
  el.className = 'post-card';
  el.id = `post-${post.id}`;
  const canDelete = currentUser.id === post.user_id || currentUser.is_admin;
  el.innerHTML = `
    <div class="post-header">
      <div class="avatar" style="background:${post.avatar_color}">${getInitials(post.username)}</div>
      <div class="post-meta">
        <div class="post-author">
          ${post.username}
          ${post.is_admin ? '<span class="badge-admin">Admin</span>' : ''}
        </div>
        <div class="post-time">${formatTime(post.created_at)}</div>
      </div>
      ${canDelete ? `<button class="btn-icon btn-danger" onclick="deletePost(${post.id})" title="حذف المنشور">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>` : ''}
    </div>
    <div class="post-content">${escapeHtml(post.content)}</div>`;
  return el;
}

function prependPost(post) {
  const container = document.getElementById('posts-container');
  const emptyState = container.querySelector('.empty-state');
  if (emptyState) emptyState.remove();
  const el = buildPostEl(post);
  container.insertBefore(el, container.firstChild);
}

function updateCharCount(el) {
  document.getElementById('char-count').textContent = `${el.value.length} / 1000`;
}

async function submitPost() {
  const content = document.getElementById('compose-text').value.trim();
  if (!content) return;
  await fetch('/api/posts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, userCode: currentUser.code, content })
  });
  document.getElementById('compose-text').value = '';
  document.getElementById('char-count').textContent = '0 / 1000';
}

async function deletePost(id) {
  openModal('حذف المنشور', 'هل أنت متأكد من حذف هذا المنشور؟ لا يمكن التراجع.', async () => {
    await fetch(`/api/posts/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, userCode: currentUser.code })
    });
  });
}

// ─── Users ────────────────────────────────────────────────────────────────
async function loadUsers() {
  if (allUsers.length === 0) {
    const res = await fetch('/api/users');
    allUsers = await res.json();
  }
  renderUsersGrid();
  renderChatUserList();
}

function renderUsersGrid() {
  const grid = document.getElementById('users-grid');
  grid.innerHTML = '';
  allUsers.forEach(u => {
    if (u.id === currentUser.id) return;
    const online = onlineUsers.has(u.id);
    const card = document.createElement('div');
    card.className = 'user-card';
    card.innerHTML = `
      <div class="user-card-avatar" style="background:${u.avatar_color}">${getInitials(u.username)}</div>
      <div class="user-card-name">${escapeHtml(u.username)}</div>
      <div class="user-card-joined">${new Date(u.created_at).toLocaleDateString('ar-MA')}</div>
      <div class="${online ? 'online-indicator' : 'offline-indicator'}">
        <span style="width:6px;height:6px;border-radius:50%;background:${online ? 'var(--success)' : 'var(--text-3)'};display:inline-block;"></span>
        ${online ? 'متصل' : 'غير متصل'}
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:12px;width:100%;" onclick="startChat(${u.id})">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        مراسلة
      </button>`;
    grid.appendChild(card);
  });
}

function refreshUserViews() {
  if (document.getElementById('view-users').classList.contains('active')) renderUsersGrid();
  renderChatUserList();
}

function refreshOnlineStatus() {
  renderChatUserList();
  if (document.getElementById('view-users').classList.contains('active')) renderUsersGrid();
}

// ─── Chat ─────────────────────────────────────────────────────────────────
async function loadUnread() {
  const res = await fetch(`/api/messages/unread/${currentUser.id}`);
  const data = await res.json();
  unreadCounts = {};
  data.forEach(d => unreadCounts[d.userId] = d.count);
  updateChatBadge();
}

function updateChatBadge() {
  const total = Object.values(unreadCounts).reduce((a, b) => a + b, 0);
  const badge = document.getElementById('nav-chat-badge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function renderChatUserList() {
  const list = document.getElementById('chat-user-list');
  list.innerHTML = '';
  const sorted = [...allUsers].filter(u => u.id !== currentUser.id);
  sorted.sort((a, b) => (onlineUsers.has(b.id) - onlineUsers.has(a.id)) || a.username.localeCompare(b.username));

  sorted.forEach(u => {
    const online = onlineUsers.has(u.id);
    const unread = unreadCounts[u.id] || 0;
    const item = document.createElement('div');
    item.className = `user-item${currentChatUser?.id === u.id ? ' active' : ''}`;
    item.id = `chat-user-${u.id}`;
    item.onclick = () => startChat(u.id);
    item.innerHTML = `
      <div style="position:relative;flex-shrink:0;">
        <div class="avatar" style="background:${u.avatar_color}">${getInitials(u.username)}</div>
        ${online ? '<div class="online-dot"></div>' : ''}
      </div>
      <span class="user-item-name">${escapeHtml(u.username)}</span>
      ${unread > 0 ? `<span class="unread-badge" id="ubadge-${u.id}">${unread}</span>` : `<span id="ubadge-${u.id}"></span>`}`;
    list.appendChild(item);
  });
}

function updateUserUnreadBadge(uid) {
  const el = document.getElementById(`ubadge-${uid}`);
  if (!el) return;
  const count = unreadCounts[uid] || 0;
  if (count > 0) {
    el.textContent = count;
    el.className = 'unread-badge';
  } else {
    el.textContent = '';
    el.className = '';
  }
}

async function startChat(userId) {
  if (!allUsers.length) {
    const res = await fetch('/api/users');
    allUsers = await res.json();
    renderChatUserList();
  }
  currentChatUser = allUsers.find(u => u.id === userId);
  if (!currentChatUser) return;

  // Switch to chat view
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="chat"]').classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-chat').classList.add('active');

  // Mark active in sidebar
  document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`chat-user-${userId}`)?.classList.add('active');

  // Clear unread
  delete unreadCounts[userId];
  updateChatBadge();
  updateUserUnreadBadge(userId);

  renderChatArea();
}

function renderChatArea() {
  const area = document.getElementById('chat-area');
  const online = onlineUsers.has(currentChatUser.id);
  area.innerHTML = `
    <div class="chat-header">
      <div style="position:relative;">
        <div class="avatar avatar-lg" style="background:${currentChatUser.avatar_color}">${getInitials(currentChatUser.username)}</div>
        ${online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div>
        <div class="chat-with-name">${escapeHtml(currentChatUser.username)}</div>
        <div class="chat-status">${online ? 'متصل الآن' : 'غير متصل'}</div>
      </div>
    </div>
    <div class="messages-area" id="messages-area"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="اكتب رسالة..." rows="1"
        onkeydown="chatKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>`;
  loadMessages();
}

function renderChatEmpty() {
  currentChatUser = null;
  document.getElementById('chat-area').innerHTML = `
    <div class="chat-empty-state">
      <div class="chat-empty-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" color="#606060"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div style="font-size:14px; color:var(--text-3);">اختر شخصًا لبدء المحادثة</div>
    </div>`;
}

async function loadMessages() {
  const area = document.getElementById('messages-area');
  if (!area) return;
  area.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
  const res = await fetch(`/api/messages/${currentUser.id}/${currentChatUser.id}`);
  const msgs = await res.json();
  area.innerHTML = '';
  msgs.forEach(m => area.appendChild(buildMsgEl(m)));
  area.scrollTop = area.scrollHeight;
}

function buildMsgEl(msg) {
  const isOut = msg.from_user_id === currentUser.id;
  const canDel = isOut || currentUser.is_admin;
  const wrap = document.createElement('div');
  wrap.className = `msg-wrapper ${isOut ? 'outgoing' : 'incoming'}`;
  wrap.id = `msg-${msg.id}`;
  wrap.innerHTML = `
    ${!isOut ? `<div class="avatar avatar-sm" style="background:${msg.avatar_color}">${getInitials(msg.username)}</div>` : ''}
    <div style="position:relative;">
      <div class="msg-bubble">${escapeHtml(msg.content)}</div>
      ${canDel ? `<button class="msg-delete-btn" onclick="deleteMessage(${msg.id})">
        <svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>` : ''}
    </div>
    <div class="msg-time">${formatMsgTime(msg.created_at)}</div>`;
  return wrap;
}

function appendMessage(msg) {
  const area = document.getElementById('messages-area');
  if (!area) return;
  const el = buildMsgEl(msg);
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function chatKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const content = input.value.trim();
  if (!content || !currentChatUser) return;

  input.value = '';
  input.style.height = 'auto';

  const res = await fetch('/api/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      fromUserId: currentUser.id,
      toUserId: currentChatUser.id,
      content,
      userCode: currentUser.code
    })
  });
  const msg = await res.json();
  appendMessage(msg);
}

async function deleteMessage(id) {
  await fetch(`/api/messages/${id}`, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, userCode: currentUser.code })
  });
}

// ─── Admin ────────────────────────────────────────────────────────────────
async function loadAdmin() {
  if (!currentUser.is_admin) return;

  const [usersRes, postsRes] = await Promise.all([
    fetch('/api/users'),
    fetch('/api/posts')
  ]);
  const users = await usersRes.json();
  const posts = await postsRes.json();

  // Users table
  const usersTable = document.getElementById('admin-users-table');
  usersTable.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>الاسم</th>
          <th>الكود</th>
          <th>الصلاحية</th>
          <th>تاريخ الإنشاء</th>
          <th>إجراء</th>
        </tr>
      </thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td style="color:var(--text-3);">#${u.id}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="avatar avatar-sm" style="background:${u.avatar_color}">${getInitials(u.username)}</div>
                ${escapeHtml(u.username)}
              </div>
            </td>
            <td><span class="code-chip">${u.code}</span></td>
            <td>${u.is_admin ? '<span class="badge-admin">Admin</span>' : '<span style="color:var(--text-3)">مستخدم</span>'}</td>
            <td style="color:var(--text-2);">${new Date(u.created_at).toLocaleString('ar-MA')}</td>
            <td>
              ${u.id !== currentUser.id ? `<button class="btn btn-danger" onclick="adminDeleteUser(${u.id}, '${escapeHtml(u.username)}')">حذف</button>` : '<span style="color:var(--text-3);font-size:12px;">أنت</span>'}
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;

  // Posts table
  const postsTable = document.getElementById('admin-posts-table');
  postsTable.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>المنشور</th>
          <th>صاحبه</th>
          <th>التاريخ</th>
          <th>إجراء</th>
        </tr>
      </thead>
      <tbody>
        ${posts.map(p => `
          <tr>
            <td style="color:var(--text-3);">#${p.id}</td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(p.content)}</td>
            <td>${escapeHtml(p.username)}</td>
            <td style="color:var(--text-2);">${new Date(p.created_at).toLocaleString('ar-MA')}</td>
            <td><button class="btn btn-danger" onclick="deletePost(${p.id})">حذف</button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function adminDeleteUser(id, name) {
  openModal(`حذف المستخدم "${name}"`, 'سيتم حذف حسابه وجميع منشوراته ورسائله. هذا الإجراء لا يمكن التراجع عنه.', async () => {
    const res = await fetch(`/api/users/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminCode: currentUser.code })
    });
    if (res.ok) {
      showToast('تم الحذف', `تم حذف مستخدم "${name}"`, 'var(--danger)');
      loadAdmin();
    }
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────
(async function init() {
  const saved = localStorage.getItem('tawasl_user');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      // Verify with server
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: parsed.code })
      });
      if (res.ok) {
        const data = await res.json();
        currentUser = data.user;
        startApp();
        // Pre-load users
        const ur = await fetch('/api/users');
        allUsers = await ur.json();
        renderChatUserList();
        return;
      }
    } catch (_) {}
    localStorage.removeItem('tawasl_user');
  }
})();

// Enter key for auth inputs
document.getElementById('reg-name')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') register();
});
document.getElementById('login-code')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
